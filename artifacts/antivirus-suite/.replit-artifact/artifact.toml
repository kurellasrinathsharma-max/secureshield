kind = "web"
previewPath = "/"
title = "SecureShield Antivirus Suite"
version = "1.0.0"
id = "artifacts/antivirus-suite"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18284

[services.development]
run = "pnpm --filter @workspace/antivirus-suite run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/antivirus-suite", "run", "build" ]
publicDir = "artifacts/antivirus-suite/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18284"
BASE_PATH = "/"
