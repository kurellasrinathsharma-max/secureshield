<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SecureShield</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f;
      color: #fff;
      font-family: -apple-system, 'Inter', 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
      -webkit-app-region: drag;
    }

    .bg-glow {
      position: fixed;
      inset: 0;
      pointer-events: none;
    }
    .bg-glow::before {
      content: '';
      position: absolute;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(59,130,246,0.12) 0%, transparent 70%);
      border-radius: 50%;
    }

    .logo-wrap {
      position: relative;
      width: 100px;
      height: 100px;
      margin-bottom: 28px;
    }

    .ring {
      position: absolute;
      inset: -10px;
      border-radius: 50%;
      border: 1.5px solid rgba(59,130,246,0.25);
      animation: ringPulse 2.5s ease-in-out infinite;
    }
    .ring:nth-child(2) { inset: -22px; animation-delay: 0.5s; }
    .ring:nth-child(3) { inset: -36px; animation-delay: 1s; }

    @keyframes ringPulse {
      0%, 100% { opacity: 0.3; transform: scale(1); }
      50% { opacity: 0.7; transform: scale(1.03); }
    }

    .logo-box {
      width: 100px;
      height: 100px;
      background: linear-gradient(135deg, #1e3a5f, #0f172a);
      border-radius: 22px;
      border: 1.5px solid rgba(59,130,246,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 40px rgba(59,130,246,0.15), inset 0 1px 0 rgba(255,255,255,0.05);
      animation: logoPulse 2s ease-in-out infinite;
    }

    @keyframes logoPulse {
      0%, 100% { box-shadow: 0 0 40px rgba(59,130,246,0.15); }
      50% { box-shadow: 0 0 60px rgba(59,130,246,0.3); }
    }

    .logo-box svg { filter: drop-shadow(0 0 8px rgba(59,130,246,0.5)); }

    h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 6px;
      background: linear-gradient(135deg, #fff, #94a3b8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .tagline {
      font-size: 13px;
      color: #64748b;
      margin-bottom: 52px;
      letter-spacing: 0.3px;
    }

    .loader-track {
      width: 200px;
      height: 2px;
      background: rgba(255,255,255,0.05);
      border-radius: 99px;
      overflow: hidden;
      margin-bottom: 16px;
    }
    .loader-bar {
      height: 100%;
      background: linear-gradient(90deg, #1d4ed8, #3b82f6, #60a5fa);
      border-radius: 99px;
      animation: load 2s ease-in-out forwards;
    }
    @keyframes load {
      0% { width: 0%; }
      30% { width: 45%; }
      70% { width: 75%; }
      100% { width: 95%; }
    }

    .status {
      font-size: 11px;
      color: #475569;
      letter-spacing: 0.5px;
      animation: fadeText 2s ease-in-out;
    }
    @keyframes fadeText {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 0.8; }
    }

    .version {
      position: fixed;
      bottom: 20px;
      font-size: 11px;
      color: #334155;
    }
  </style>
</head>
<body>
  <div class="bg-glow"></div>

  <div class="logo-wrap">
    <div class="ring"></div>
    <div class="ring"></div>
    <div class="ring"></div>
    <div class="logo-box">
      <svg width="52" height="52" viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M26 4L44 11V26C44 36.5 36 45 26 49C16 45 8 36.5 8 26V11L26 4Z"
              fill="rgba(59,130,246,0.12)" stroke="#3b82f6" stroke-width="1.5"/>
        <path d="M16 27L22 33L36 19"
              stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
  </div>

  <h1>SecureShield</h1>
  <p class="tagline">Initializing protection layers...</p>

  <div class="loader-track">
    <div class="loader-bar"></div>
  </div>
  <p class="status">LOADING SECURE ENVIRONMENT</p>

  <p class="version">SecureShield v1.0.0</p>
</body>
</html>
